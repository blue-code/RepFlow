name: RepFlow
options:
  bundleIdPrefix: com.digimaru.repflow
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.3"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: KUDC7C6Z9H
    CODE_SIGN_STYLE: Automatic
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG

schemes:
  RepFlow:
    build:
      targets:
        RepFlow: all
        RepFlowTests: [test]
        RepFlowUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - RepFlowTests
        - RepFlowUITests
    archive:
      config: Release

  RepFlowWatch:
    build:
      targets:
        RepFlowWatch: all
    run:
      config: Debug
    archive:
      config: Release

targets:
  RepFlow:
    type: application
    platform: iOS
    sources:
      - path: RepFlow
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    resources:
      - path: RepFlow/Resources/Assets.xcassets
      - path: RepFlow/Resources/en.lproj
      - path: RepFlow/Resources/ko.lproj
      - path: RepFlow/Resources/ja.lproj
      - path: RepFlow/Resources/zh-Hans.lproj
      - path: RepFlow/Resources/RepFlow.storekit
    settings:
      base:
        INFOPLIST_FILE: RepFlow/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.digimaru.repflow
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTED_INTERFACE_ORIENTATIONS: UIInterfaceOrientationPortrait
        KNOWN_REGIONS: "en ko ja zh-Hans"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: RepFlow/Resources/RepFlow.entitlements
      properties:
        com.apple.developer.healthkit: true
    dependencies:
      - sdk: WatchConnectivity.framework
      - sdk: HealthKit.framework
      - sdk: CoreMotion.framework
      - sdk: UserNotifications.framework
      - target: RepFlowWatch
        embed: true

  RepFlowWatch:
    type: application
    platform: watchOS
    deploymentTarget:
      watchOS: "10.0"
    sources:
      - path: RepFlowWatch
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    resources:
      - path: RepFlowWatch/Resources/Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: RepFlowWatch/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.digimaru.repflow.watch
        TARGETED_DEVICE_FAMILY: "4"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: RepFlowWatch/Resources/RepFlowWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
    dependencies:
      - sdk: WatchConnectivity.framework
      - sdk: HealthKit.framework
      - sdk: CoreMotion.framework

  RepFlowTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RepFlowTests
    dependencies:
      - target: RepFlow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.digimaru.repflow.tests
        GENERATE_INFOPLIST_FILE: YES

  RepFlowUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RepFlowUITests
    dependencies:
      - target: RepFlow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.digimaru.repflow.uitests
        GENERATE_INFOPLIST_FILE: YES
